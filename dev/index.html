<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Exercice To do list</title>
   <link rel="stylesheet" href="css/styles.min.css">
</head>
<body>
   <div class="input__wrapper">
      <h1>To do list</h1>
      <div class="input__btn__wrapper">
         <input type="text" placeholder="Add ask">
         <span class="error">Veuillez remplir la case</span>
         <span class="error__hide">Veuillez afficher la liste</span>
         <button class="btn__add">Add task</button>

      </div>
   </div>
   <div class="hide">
      Hide list
   </div>
   <div class="ask__wrapper">
      <div class="ask__box">
      </div>
      <div class="removeall__wrapper">
         <button class="btn__removeall">Remove All</button>
      </div>
   </div>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
   <script src="js/main.js"></script>
</body>
</html>
